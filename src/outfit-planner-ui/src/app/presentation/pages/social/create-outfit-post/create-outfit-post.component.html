<div class="create-outfit-post-page">
  <div class="page-header">
    <h1>Create Outfit Post</h1>
    <p>Share your outfit with the community</p>
  </div>

  <mat-card class="create-post-card" *ngIf="!(loading$ | async)">
    <form [formGroup]="outfitPostForm" (ngSubmit)="onSubmit()">
      <mat-card-content>
        <!-- Outfit Selection -->
        <div class="outfit-selection">
          <h3>Select an Outfit</h3>
          <div class="outfits-grid">
            <div 
              *ngFor="let outfit of userOutfits" 
              class="outfit-item"
              [class.selected]="selectedOutfit?.id === outfit.id"
              (click)="selectOutfit(outfit)">
              <img [src]="outfit.imageUrl" [alt]="outfit.name" class="outfit-image">
              <div class="outfit-info">
                <p class="outfit-name">{{ outfit.name }}</p>
              </div>
            </div>
          </div>
          
          <mat-form-field appearance="outline" class="outfit-id-field" *ngIf="selectedOutfit">
            <mat-label>Selected Outfit</mat-label>
            <input matInput formControlName="outfitId" readonly>
            <mat-icon matSuffix>check_circle</mat-icon>
          </mat-form-field>
        </div>

        <!-- Caption -->
        <mat-form-field appearance="outline" class="caption-field">
          <mat-label>Caption (Optional)</mat-label>
          <textarea 
            matInput 
            formControlName="caption" 
            rows="4"
            placeholder="Tell us about this outfit...">
          </textarea>
          <mat-hint align="end">
            {{ getCaptionRemaining() }} characters remaining
          </mat-hint>
        </mat-form-field>

        <!-- Visibility -->
        <mat-form-field appearance="outline" class="visibility-field">
          <mat-label>Visibility</mat-label>
          <mat-select formControlName="visibility">
            <mat-option *ngFor="let option of visibilityOptions" [value]="option.value">
              {{ option.label }}
            </mat-option>
          </mat-select>
          <mat-icon matSuffix>visibility</mat-icon>
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-button type="button" (click)="onCancel()">
          Cancel
        </button>
        <button 
          mat-raised-button 
          color="primary" 
          type="submit"
          [disabled]="outfitPostForm.invalid || !selectedOutfit">
          <mat-icon>share</mat-icon>
          Share Outfit
        </button>
      </mat-card-actions>
    </form>
  </mat-card>

  <!-- Loading State -->
  <div *ngIf="loading$ | async" class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Creating your post...</p>
  </div>
</div>
