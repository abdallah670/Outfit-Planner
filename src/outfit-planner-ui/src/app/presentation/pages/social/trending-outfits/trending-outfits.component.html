<div class="trending-page">
  <header class="header">
    <div class="back-link" routerLink="/social">
      <mat-icon>arrow_back</mat-icon>
      <span>Back to Social</span>
    </div>
    <h1 class="page-title">All Trending Outfits</h1>
  </header>

  <main class="main-content">
    <div class="trending-grid" *ngIf="trendingOutfits().length > 0">
      <div class="trending-card"
           *ngFor="let outfit of trendingOutfits()"
           (click)="viewDetails(outfit)">
        <div class="outfit-images">
          <img [src]="outfit.imageUrl" alt="Outfit Option 1">
          <img [src]="outfit.imageUrl" alt="Outfit Option 2">
        </div>
        <div class="outfit-meta">
          <div class="user-row">
            <img [src]="outfit.userAvatar || 'assets/default-avatar.png'" alt="User" class="user-avatar">
            <span class="username">{{ outfit.userName }}</span>
          </div>
          <div class="engagement-row">
            <button mat-icon-button (click)="react(outfit, 'Like')">
              <mat-icon [class.active]="true" class="heart-icon">favorite</mat-icon>
            </button>
            <span class="likes-count">{{ outfit.likes > 1000 ? (outfit.likes / 1000).toFixed(1) + 'k' : outfit.likes }} likes</span>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="trendingOutfits().length === 0 && !loading()" class="empty-state">
      <mat-icon>explore</mat-icon>
      <p>No trending outfits yet. Check back later!</p>
    </div>

    <div *ngIf="loading()" class="loading-state">
      <p>Loading trending outfits...</p>
    </div>
  </main>
</div>
