<div class="trending-page">
  <header class="header">
    <div class="back-link" routerLink="/social">
      <mat-icon>arrow_back</mat-icon>
      <span>Back to Social</span>
    </div>
    <h1 class="page-title">All Trending Outfits</h1>
  </header>

  <main class="main-content">
    <div class="trending-grid" *ngIf="trendingOutfits().length > 0">
       <div class="trending-card"
            *ngFor="let outfit of trendingOutfits()"
            (click)="viewDetails(outfit)">
         <div class="outfit-image-container" *ngIf="outfit.imageUrl; else noImage">
           <img [src]="outfit.imageUrl" alt="Trending outfit" class="trending-image">
         </div>
         <ng-template #noImage>
           <div class="outfit-placeholder">
             <mat-icon>image</mat-icon>
           </div>
         </ng-template>
          <div class="outfit-info">
            <p class="outfit-occasion" *ngIf="outfit.occasion">{{ outfit.occasion }}</p>
            <div class="stats">
              <mat-icon>favorite</mat-icon>
              <span>{{ outfit.likes > 1000 ? (outfit.likes / 1000).toFixed(1) + 'k' : outfit.likes }} likes</span>
              <mat-icon>chat_bubble</mat-icon>
              <span>{{ outfit.comments }} comments</span>
            </div>
          </div>
        </div>
     </div>

    <div *ngIf="trendingOutfits().length === 0 && !loading()" class="empty-state">
      <mat-icon>explore</mat-icon>
      <p>No trending outfits yet. Check back later!</p>
    </div>

    <div *ngIf="loading()" class="loading-state">
      <p>Loading trending outfits...</p>
    </div>
  </main>
</div>
