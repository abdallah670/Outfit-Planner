<div class="outfits-dashboard">
  <header class="dashboard-header">
    <div class="header-content">
      <h1>My Outfits</h1>
      <p>Your curated wardrobe combinations</p>
    </div>

    <div class="filters">
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Occasion</mat-label>
        <mat-select [value]="selectedOccasion()" (selectionChange)="onOccasionChange($event.value)">
          <mat-option value="">All Occasions</mat-option>
          <mat-option *ngFor="let occasion of occasions" [value]="occasion">
            {{ occasion | titlecase }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Season</mat-label>
        <mat-select [value]="selectedSeason()" (selectionChange)="onSeasonChange($event.value)">
          <mat-option value="">All Seasons</mat-option>
          <mat-option *ngFor="let season of seasons" [value]="season">
            {{ season | titlecase }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field search-field">
        <mat-label>Search</mat-label>
        <input
          matInput
          [value]="searchQuery()"
          (input)="onSearchChange($any($event.target).value)"
          placeholder="Search outfits..."
        />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Sort By</mat-label>
        <mat-select [value]="sortBy()" (selectionChange)="onSortChange($event.value)">
          <mat-option *ngFor="let option of sortOptions" [value]="option.value">
            {{ option.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button
        mat-button
        color="primary"
        (click)="clearFilters()"
        *ngIf="selectedOccasion() || selectedSeason() || searchQuery()"
      >
        Clear Filters
      </button>
    </div>
  </header>

  <div class="outfits-content" *ngIf="!(loading$ | async); else loader">
    <div class="outfits-grid" *ngIf="filteredOutfits().length > 0; else emptyState">
      <app-outfit-card
        *ngFor="let outfit of filteredOutfits(); trackBy: trackByOutfitId"
        [outfit]="outfit"
      ></app-outfit-card>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>inventory_2</mat-icon>
        <h3>No outfits found</h3>
        <p *ngIf="selectedOccasion() || selectedSeason() || searchQuery()">
          Try adjusting your filters
        </p>
        <p *ngIf="!selectedOccasion() && !selectedSeason() && !searchQuery()">
          Start building your first combination!
        </p>
        <button mat-flat-button color="primary" routerLink="/outfits/build">Create Outfit</button>
      </div>
    </ng-template>
  </div>

  <ng-template #loader>
    <div class="loading-state">
      <div class="spinner"></div>
    </div>
  </ng-template>

  <button
    mat-fab
    color="primary"
    class="fab-btn"
    routerLink="/outfits/build"
    aria-label="Create new outfit"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
