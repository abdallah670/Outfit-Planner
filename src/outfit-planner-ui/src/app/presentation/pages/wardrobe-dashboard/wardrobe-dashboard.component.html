<div class="dashboard-wrapper">
  <div class="content-container">
    <div class="dashboard-layout">
      <!-- Filters Sidebar -->
      <aside class="sidebar-filters glass-card fade-in">
        <div class="sidebar-header">
          <h3>Filters</h3>
          <button (click)="clearFilters()" class="clear-btn">Clear All</button>
        </div>

        <div class="filter-section">
          <label>Category</label>
          <div class="filter-grid">
            <button
              *ngFor="let cat of categories"
              [class.active]="activeCategory() === cat"
              (click)="setCategory(cat)"
              class="filter-chip"
            >
              {{ cat }}
            </button>
          </div>
        </div>

        <div class="filter-section">
          <label>Color</label>
          <div class="filter-grid">
            <button
              *ngFor="let color of colors"
              [class.active]="activeColor() === color"
              (click)="setColor(color)"
              class="filter-chip"
            >
              {{ color }}
            </button>
          </div>
        </div>

        <div class="filter-section">
          <label>Season</label>
          <div class="filter-grid">
            <button
              *ngFor="let season of seasons"
              [class.active]="activeSeason() === season"
              (click)="setSeason(season)"
              class="filter-chip"
            >
              {{ season }}
            </button>
          </div>
        </div>

        <div class="filter-section">
          <label>Occasion</label>
          <div class="filter-grid">
            <button
              *ngFor="let occ of occasions"
              [class.active]="activeOccasion() === occ"
              (click)="setOccasion(occ)"
              class="filter-chip"
            >
              {{ occ }}
            </button>
          </div>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <header class="page-header">
          <div class="header-text">
            <h1 class="gradient-text">Wardrobe Manager</h1>
            <p class="subtitle">Organize and Manage Your Collection</p>
          </div>
          <button mat-flat-button color="primary" class="add-btn" routerLink="/wardrobe/new">
            <i class="fa-solid fa-plus me-2"></i>
            ADD ITEM
          </button>
        </header>

        <section class="items-section">
          <div *ngIf="loading()" class="loading-overlay">
            <mat-spinner diameter="48"></mat-spinner>
          </div>

          <div class="items-grid" *ngIf="!loading() && items().length > 0">
            <app-clothing-card
              *ngFor="let item of items(); trackBy: trackByItem"
              [item]="item"
              (delete)="onDelete(item.id)"
              (recordWear)="onRecordWear(item.id)"
            ></app-clothing-card>
          </div>

          <!-- Empty State -->
          <div class="empty-state fade-in" *ngIf="!loading() && items().length === 0">
            <div class="empty-icon-wrapper">
              <i class="fa-solid fa-boxes-stacked"></i>
            </div>
            <h3>No pieces found</h3>
            <p>Try adjusting your filters or add a new masterpiece to your vault.</p>
            <button mat-stroked-button color="primary" routerLink="/wardrobe/new">
              ADD YOUR FIRST ITEM
            </button>
          </div>
        </section>
      </main>
    </div>
  </div>
</div>
