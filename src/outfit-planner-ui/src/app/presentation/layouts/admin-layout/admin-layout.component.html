<div class="admin-layout">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" [opened]="true" class="admin-sidenav">
      <div class="sidenav-header">
        <h2>Admin Panel</h2>
      </div>
      <mat-nav-list>
        <a mat-list-item routerLink="/admin/dashboard" routerLinkActive="active">
          <mat-icon>dashboard</mat-icon> Dashboard
        </a>
        <a mat-list-item routerLink="/admin/users" routerLinkActive="active">
          <mat-icon>people</mat-icon> Users
        </a>
        <a mat-list-item routerLink="/admin/reports" routerLinkActive="active">
          <mat-icon>flag</mat-icon> Reports
          <span class="badge" *ngIf="(pendingReportsCount$ | async) as count">
            {{ count }}
          </span>
        </a>
        <a mat-list-item routerLink="/admin/settings" routerLinkActive="active">
          <mat-icon>settings</mat-icon> Settings
        </a>
        <a mat-list-item routerLink="/admin/audit-logs" routerLinkActive="active">
          <mat-icon>list</mat-icon> Audit Logs
        </a>
        <mat-divider></mat-divider>
        <a mat-list-item routerLink="/admin/content/posts" routerLinkActive="active">
          <mat-icon>article</mat-icon> Posts
        </a>
        <a mat-list-item routerLink="/admin/content/polls" routerLinkActive="active">
          <mat-icon>poll</mat-icon> Polls
        </a>
        <a mat-list-item routerLink="/admin/content/outfits" routerLinkActive="active">
          <mat-icon>checkroom</mat-icon> Outfits
        </a>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
