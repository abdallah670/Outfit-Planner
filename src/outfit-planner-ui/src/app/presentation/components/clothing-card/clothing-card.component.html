<div class="clothing-card" [routerLink]="['/wardrobe', item.id]">
  <div class="card-visual" [style.background-color]="colorBackground">
    <!-- Item Image or Emoji fallback -->
    <img
      *ngIf="item.imageUrl && !imageError"
      [src]="item.imageUrl"
      [alt]="item.name"
      class="card-image"
      (error)="onImageError()"
    />
    <img
      *ngIf="!item.imageUrl || imageError"
      src="assets/placeholder.jpg"
      alt="Placeholder"
      class="card-image"
    />

    <!-- Delete button (hover) -->
    <button class="delete-btn" (click)="onDelete($event)">×</button>
  </div>

  <div class="card-info">
    <h4 class="card-name">{{ item.name }}</h4>
    <div class="card-footer">
      <div class="color-dot" [style.background-color]="item.primaryColor"></div>
      <span class="wear-count">♡ {{ item.wearCount || 0 }}</span>
    </div>
  </div>
</div>
