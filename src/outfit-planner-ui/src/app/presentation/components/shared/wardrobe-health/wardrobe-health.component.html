<div class="health-widget">
  <div class="metrics">
    <div class="metric-row">
      <span class="label">Items Worn</span>
      <span class="value">{{ healthPercentage() }}%</span>
    </div>
    <mat-progress-bar mode="determinate" [value]="healthPercentage()" class="health-bar"></mat-progress-bar>
  </div>
</div>
