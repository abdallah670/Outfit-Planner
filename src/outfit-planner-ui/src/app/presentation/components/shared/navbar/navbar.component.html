<nav class="navbar">
  <div class="nav-left">
    <div class="logo" routerLink="/">
      <i class="fa-solid fa-shirt logo-icon"></i>
      <span class="logo-text">Outfit Planner</span>
    </div>
  </div>

  <div class="nav-center">
    <a routerLink="/wardrobe" routerLinkActive="active" class="nav-link">My Wardrobe</a>
    <a routerLink="/outfits" routerLinkActive="active" class="nav-link">Plan Outfits</a>
    <a routerLink="/calendar" routerLinkActive="active" class="nav-link">Calendar</a>
    <a routerLink="/social" routerLinkActive="active" class="nav-link">Social</a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-link">Settings</a>
  </div>

  <div class="nav-right">
    <button routerLink="/search" mat-icon-button class="nav-icon-btn" aria-label="Search">
      <mat-icon>search</mat-icon>
    </button>
    <button
      routerLink="/notifications"
      mat-icon-button
      class="nav-icon-btn"
      [matBadge]="notificationsCount$ | async"
      [matBadgeHidden]="!(notificationsCount$ | async)"
      matBadgeColor="warn"
      aria-label="Notifications"
    >
      <mat-icon>notifications_none</mat-icon>
    </button>
    
    <!-- Admin link (only shown for admin users) -->
    <button *ngIf="isAdmin()" routerLink="/admin/dashboard" mat-icon-button class="nav-icon-btn" aria-label="Admin Panel">
      <mat-icon>admin_panel_settings</mat-icon>
    </button>
    
    <div class="user-profile" routerLink="/profile" style="cursor: pointer">
      <ng-container *ngIf="profilePictureUrl$ | async as profilePictureUrl; else fallbackAvatar">
        <div
          class="avatar-image-container"
          *ngIf="!isImageFailed(profilePictureUrl); else fallbackAvatar"
        >
          <img
            [src]="profilePictureUrl"
            alt="Profile avatar"
            class="avatar-image"
            (error)="onImageError($event, profilePictureUrl)"
          />
        </div>
      </ng-container>
      <ng-template #fallbackAvatar>
        <div class="avatar-placeholder">
          <img src="assets/default-avatar.png" alt="Default avatar" class="avatar-image" />
        </div>
      </ng-template>
    </div>
  </div>
</nav>
