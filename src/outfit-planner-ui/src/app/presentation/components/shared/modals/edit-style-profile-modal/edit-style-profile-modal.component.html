<h2 mat-dialog-title>Edit Style Profile</h2>
<mat-dialog-content>
  <form [formGroup]="styleForm" (ngSubmit)="onSubmit()">
    <!-- Core Style -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Core Style</mat-label>
      <mat-select formControlName="style">
        <mat-option *ngFor="let style of stylePreferences" [value]="style">
          {{ style }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Fit Preferences -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Fit Preferences</mat-label>
      <mat-select formControlName="fitPreferences">
        <mat-option value="Slim">Slim</mat-option>
        <mat-option value="Regular">Regular</mat-option>
        <mat-option value="Loose">Loose</mat-option>
        <mat-option value="Athletic">Athletic</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Comfort Priority -->
    <div class="form-field">
      <label>Comfort Priority: {{ styleForm.get('comfortPriority')?.value }}</label>
      <input type="range" formControlName="comfortPriority" min="1" max="10" step="1" />
    </div>

    <!-- Accepts Trends -->
    <mat-slide-toggle formControlName="acceptsTrends" class="full-width">
      Accept Fashion Trends
    </mat-slide-toggle>

    <!-- Preferred Colors -->
    <div class="color-section">
      <label>Favorite Colors</label>
      <div class="color-input">
        <input type="color" #colorPicker (change)="addColor(colorPicker.value)" />
        <button type="button" mat-stroked-button (click)="addColor(colorPicker.value)">
          Add Color
        </button>
      </div>
      <div class="color-list">
        <div *ngFor="let color of selectedColors; let i = index" class="color-item">
          <span class="color-dot" [style.background-color]="color"></span>
          <span>{{ color }}</span>
          <button type="button" mat-icon-button (click)="removeColor(i)">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Custom Rules Section -->
    <div class="rules-section">
      <div class="rules-header">
        <label>Style Rules</label>
        <button type="button" mat-stroked-button (click)="addCustomRule()">
          <mat-icon>add</mat-icon> Add Rule
        </button>
      </div>
      
      <div *ngIf="customRules.length === 0" class="no-rules">
        <p>No custom rules added. Click "Add Rule" to create style rules.</p>
      </div>
      
      <div *ngFor="let rule of customRules; let i = index" class="rule-item">
        <div class="rule-header">
          <span>Rule {{ i + 1 }}</span>
          <button type="button" mat-icon-button (click)="removeCustomRule(i)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Rule Name</mat-label>
          <input matInput 
            [value]="rule.name" 
            (input)="updateCustomRule(i, 'name', $any($event.target).value)"
            placeholder="e.g., No black with brown" />
        </mat-form-field>
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput 
            [value]="rule.description"
            (input)="updateCustomRule(i, 'description', $any($event.target).value)"
            placeholder="Describe your style rule..."
            rows="2"></textarea>
        </mat-form-field>
        <mat-slide-toggle 
          [checked]="rule.isActive"
          (change)="updateCustomRule(i, 'isActive', $event.checked)">
          Active
        </mat-slide-toggle>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    [disabled]="styleForm.invalid || isLoading"
    (click)="onSubmit()"
  >
    {{ isLoading ? 'Saving...' : 'Save' }}
  </button>
</mat-dialog-actions>
