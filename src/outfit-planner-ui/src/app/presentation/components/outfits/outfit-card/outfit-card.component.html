<mat-card class="outfit-card" [routerLink]="['/outfits', outfit.id]">
  <div class="outfit-visual">
    <!-- Combined Image View -->
    <div *ngIf="showCombinedView && combinedImageUrl" class="combined-view">
      <img [src]="combinedImageUrl" [alt]="outfit.name" />
    </div>
    
    <!-- Separate Items Grid View -->
    <div
      *ngIf="!showCombinedView || !combinedImageUrl"
      class="items-grid"
      [class.single]="outfit.items.length === 1"
      [class.multiple]="outfit.items.length > 1"
    >
      <ng-container *ngIf="outfit.items.length > 0; else noItems">
        <div *ngFor="let item of outfit.items.slice(0, 4); let i = index" class="item-thumbnail">
          <img
            *ngIf="$any(item).clothingItemImageUrl && !imageError[i]"
            [src]="$any(item).clothingItemImageUrl"
            [alt]="$any(item).clothingItemName || 'Clothing item'"
            (error)="onImageError(i)"
          />
          <span *ngIf="!$any(item).clothingItemImageUrl || imageError[i]" class="fallback-emoji">🧥</span>
        </div>
      </ng-container>
      <ng-template #noItems>
        <div class="empty-visual">
          <mat-icon>Checkroom</mat-icon>
        </div>
      </ng-template>
    </div>
    
    <!-- Loading State -->
    <div *ngIf="isGenerating" class="loading-overlay">
      <mat-icon class="spinning">sync</mat-icon>
      <span>Generating...</span>
    </div>
    
    <div class="occasion-badge">{{ occasionEmoji }}</div>
    
    <!-- View Toggle Button -->
    <button 
      mat-mini-fab 
      class="view-toggle-btn"
      color="primary"
      (click)="toggleView($event)"
      [matTooltip]="showCombinedView ? 'Show separate items' : 'Show combined view'"
    >
      <mat-icon *ngIf="showCombinedView">grid_view</mat-icon>
      <mat-icon *ngIf="!showCombinedView">combine</mat-icon>
    </button>
    
    <!-- Download Button -->
    <button 
      mat-mini-fab 
      class="download-btn"
      color="primary"
      (click)="downloadCombinedImage($event)"
      [disabled]="isGenerating"
      [matTooltip]="isGenerating ? 'Generating...' : 'Download combined image'"
    >
      <mat-icon *ngIf="!isGenerating">download</mat-icon>
      <mat-icon *ngIf="isGenerating" class="spinning">sync</mat-icon>
    </button>
  </div>

  <div class="outfit-info">
    <h3 class="outfit-name">{{ outfit.name }}</h3>

    <div class="outfit-meta">
      <mat-chip-set>
        <mat-chip class="season-chip">{{ outfit.season }}</mat-chip>
        <mat-chip class="count-chip">{{ outfit.items.length }} items</mat-chip>
      </mat-chip-set>
    </div>

    <div class="outfit-footer">
      <span class="worn-count">
        <mat-icon>history</mat-icon>
        {{ outfit.timesWorn }} wears
      </span>
      <span class="last-worn" *ngIf="outfit.lastWorn">
        Last: {{ outfit.lastWorn | date: 'shortDate' }}
      </span>
    </div>
  </div>
</mat-card>
