<h2 mat-dialog-title>{{ data.event.outfitName }}</h2>

<mat-dialog-content>
  <div class="outfit-detail">
    <!-- Outfit Image -->
    <div class="outfit-image" *ngIf="data.event.outfitImageUrl">
      <img [src]="data.event.outfitImageUrl" [alt]="data.event.outfitName">
    </div>
    
    <!-- Outfit Info -->
    <div class="outfit-info">
      <div class="info-row">
        <mat-icon>event</mat-icon>
        <span>{{ data.event.scheduledDate | date:'fullDate' }}</span>
      </div>
      
      <div class="info-row" *ngIf="data.event.occasion">
        <mat-icon>star</mat-icon>
        <span>{{ data.event.occasion }}</span>
      </div>
      
      <div class="info-row">
        <mat-icon>check_circle</mat-icon>
        <span>{{ data.event.worn ? 'Worn' : 'Scheduled' }}</span>
      </div>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onClose()">Close</button>
  
  <button 
    mat-raised-button 
    color="primary" 
    (click)="onMarkAsWorn()" 
    *ngIf="!data.event.worn">
    <mat-icon>check</mat-icon>
    Mark as Worn
  </button>
  
  <button 
    mat-raised-button 
    color="warn" 
    (click)="onDelete()">
    <mat-icon>delete</mat-icon>
    Delete
  </button>
</mat-dialog-actions>
